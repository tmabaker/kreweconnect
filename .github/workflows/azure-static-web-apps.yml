# Deploys the full KreweSuite site to the existing Azure Static Web App:
#   - landing pages checked out from tmabaker/krewesuite (site root)
#   - KreweConnect SPA built fresh from this repo -> /app/kreweconnect/
#   - api/ deployed as the SWA managed Functions API (/api/*)
#
# Setup required before this runs:
#   1. Add the SWA deployment token as a repo secret named
#      AZURE_STATIC_WEB_APPS_API_TOKEN (SWA portal -> Manage deployment token).
#   2. Disable the old workflow in the krewesuite repo (or restrict it),
#      otherwise the two deployments will overwrite each other.
#   3. Set the backend app settings in the SWA portal (AZURE_CLIENT_ID,
#      AZURE_CLIENT_SECRET, MSP_TENANT_ID, CONSENT_REDIRECT_URI) — see
#      docs/app-registration-setup.md.

name: Deploy to Azure Static Web Apps

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".claude/**"
      - "docs/**"
      - "README.md"
      - "noit-client-tools-backend/**"
      # The governance .NET API deploys to App Service (krewe-governance-api),
      # not through this workflow.
      - "apps/**"
  workflow_dispatch:

# Least-privilege default token: this workflow only reads source and deploys
# via the SWA deployment token secret, so it needs no write scopes.
permissions:
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: tmabaker/krewesuite
          path: .krewesuite

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Guard against demo mode in production build
        env:
          VITE_DEMO_MODE: ${{ vars.VITE_DEMO_MODE }}
        run: |
          # Demo mode bypasses MSAL/Entra auth entirely (see
          # src/shared/auth/demoMode.ts). It must never ship to production.
          case "$(printf '%s' "${VITE_DEMO_MODE}" | tr '[:upper:]' '[:lower:]')" in
            ""|false|0|no|off)
              echo "VITE_DEMO_MODE is not enabled — OK." ;;
            *)
              echo "::error::VITE_DEMO_MODE is truthy ('${VITE_DEMO_MODE}') in a production build. Refusing to deploy an auth-bypassing build."
              exit 1 ;;
          esac

      - name: Build SPA
        env:
          VITE_USE_BACKEND_API: "true"
          VITE_API_BASE_URL: "/api"
          VITE_REDIRECT_URI: "https://krewesuite.noitgroup.com/app/kreweconnect/"
          VITE_GOVERNANCE_API_URL: "https://krewe-governance-api.azurewebsites.net"
        run: |
          npm ci
          npm run build

      - name: Assemble site (landing pages + app)
        run: |
          mkdir -p site
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'app/kreweconnect' \
            .krewesuite/ site/
          mkdir -p site/app/kreweconnect
          cp -r dist/* site/app/kreweconnect/

      - name: Deploy
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "upload"
          app_location: "site"
          api_location: "api"
          output_location: ""
          skip_app_build: true
